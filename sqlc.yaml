version: "2"
sql:
  - engine: "postgresql"
    schema:
      - "control/db/migrations/*.sql"
    queries:
      - "control/db/queries/*.sql"
    gen:
      go:
        package: "sqlc"
        out: "control/db/sqlc"
        sql_package: "pgx/v5"
        overrides:
          - db_type: "uuid"
            nullable: false
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
              pointer: true
          - db_type: "timestamptz"
            nullable: false
            go_type:
              import: "time"
              type: "Time"
          - db_type: "timestamptz"
            nullable: true
            go_type:
              import: "time"
              type: "Time"
              pointer: true
          - db_type: "text"
            nullable: true
            go_type:
              type: "string"
              pointer: true
          - db_type: "pg_catalog.int4"
            nullable: true
            go_type:
              type: "int32"
              pointer: true
        emit_interface: false # generate go interface for queries good for mocking
        emit_prepared_queries: false # generates prepared statement version of queries
