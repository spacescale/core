version: "2"
sql:
  - engine: "postgresql"
    schema:
      - "apps/db/migrations/*.sql"
    queries:
      - "apps/api/internal/postgres/queries/*.sql"
    gen:
      go:
        package: "postgres"
        out: "apps/api/internal/postgres/gen"
        sql_package: "pgx/v5"
        emit_interface: false # generate go interface for queries good for mocking
        emit_prepared_queries: false # generates prepared statement version of queries
