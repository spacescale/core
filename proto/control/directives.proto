syntax = "proto3";

package control.v1;

option go_package = "github.com/t0gun/spacescale/packages/go/pb/v1;controlpb";

// NodeDirective carries a single host-level control command.
//
// Keeping the directive metadata directly on this message avoids a second level
// of oneof nesting in generated Go code.
//
// Safety note:
// - NODE_POWEROFF is intentionally excluded in this revision.
message NodeDirective {
  string directive_id = 1; // directive_id is a unique id for idempotent processing and audit.
  string reason = 2; // reason provides operator-readable context for the directive.
  int64 effective_unix = 3; // effective_unix is when the directive should be considered active.
  uint32 timeout_seconds = 4; // timeout_seconds bounds directive execution before timeout failure is reported.
  NodeDirectiveType type = 5; // type selects the node operation.
  uint32 grace_seconds = 6; // grace_seconds is drain/termination grace for operations that require quiescing.
  bool force = 7; // force allows emergency execution when graceful constraints cannot be met.
}

// NodeDirectiveType enumerates host-level operations.
enum NodeDirectiveType {
  NODE_DIRECTIVE_TYPE_UNSPECIFIED = 0;
  NODE_DIRECTIVE_TYPE_DRAIN = 1; // NODE_DIRECTIVE_TYPE_DRAIN stops new workloads and drains running workloads.
  NODE_DIRECTIVE_TYPE_RESUME = 2; // NODE_DIRECTIVE_TYPE_RESUME clears draining state and accepts new workloads.
  NODE_DIRECTIVE_TYPE_REBOOT = 3; // NODE_DIRECTIVE_TYPE_REBOOT requests a controlled node reboot.
}

// AgentDirective carries a single agent-process control command.
message AgentDirective {
  string directive_id = 1; // directive_id is a unique id for idempotent processing and audit.
  string reason = 2; // reason provides operator-readable context for the directive.
  int64 effective_unix = 3; // effective_unix is when the directive should be considered active.
  uint32 timeout_seconds = 4; // timeout_seconds bounds directive execution before timeout failure is reported.
  AgentDirectiveType type = 5; // type selects the agent operation.
  string target_version = 6; // target_version is the desired agent version for upgrade.
  string artifact_url = 7; // artifact_url points to the signed upgrade artifact.
  string artifact_sha256 = 8; // artifact_sha256 verifies artifact integrity before install.
  bool require_drain = 9; // require_drain forces node drain before disruptive agent operations.
  bool reboot_after_upgrade = 10; // reboot_after_upgrade requests explicit reboot after a successful upgrade.
}

// AgentDirectiveType enumerates agent process operations.
enum AgentDirectiveType {
  AGENT_DIRECTIVE_TYPE_UNSPECIFIED = 0;
  AGENT_DIRECTIVE_TYPE_RELOAD = 1; // AGENT_DIRECTIVE_TYPE_RELOAD requests in-place config/runtime reload.
  AGENT_DIRECTIVE_TYPE_UPGRADE = 2; // AGENT_DIRECTIVE_TYPE_UPGRADE requests binary upgrade with verification.
  AGENT_DIRECTIVE_TYPE_RESTART = 3; // AGENT_DIRECTIVE_TYPE_RESTART requests controlled process restart.
}

// WorkloadDirective carries a single workload/VM control command.
message WorkloadDirective {
  string directive_id = 1; // directive_id is a unique id for idempotent processing and audit.
  string reason = 2; // reason provides operator-readable context for the directive.
  int64 effective_unix = 3; // effective_unix is when the directive should be considered active.
  uint32 timeout_seconds = 4; // timeout_seconds bounds directive execution before timeout failure is reported.
  WorkloadDirectiveType type = 5; // type selects the workload operation.
  string workload_id = 6; // workload_id is the stable control-plane workload identity.
  string image_ref = 7; // image_ref identifies the image/artifact for deploy or restart-from-image.
  uint32 desired_replicas = 8; // desired_replicas applies to scale operations.
}

// WorkloadDirectiveType enumerates workload lifecycle operations.
enum WorkloadDirectiveType {
  WORKLOAD_DIRECTIVE_TYPE_UNSPECIFIED = 0;
  WORKLOAD_DIRECTIVE_TYPE_DEPLOY = 1; // WORKLOAD_DIRECTIVE_TYPE_DEPLOY creates or updates a workload revision.
  WORKLOAD_DIRECTIVE_TYPE_STOP = 2; // WORKLOAD_DIRECTIVE_TYPE_STOP gracefully stops a workload.
  WORKLOAD_DIRECTIVE_TYPE_RESTART = 3; // WORKLOAD_DIRECTIVE_TYPE_RESTART restarts workload processes.
  WORKLOAD_DIRECTIVE_TYPE_SCALE = 4; // WORKLOAD_DIRECTIVE_TYPE_SCALE changes desired workload replicas.
}

// DirectiveAck reports immediate acceptance/rejection of a directive.
message DirectiveAck {
  string directive_id = 1; // directive_id identifies which control-plane directive this ack references.
  bool accepted = 2; // accepted indicates whether directive validation/admission succeeded.
  string message = 3; // message provides a concise accept/reject reason.
  int64 acknowledged_unix = 4; // acknowledged_unix is when the directive was acknowledged by the agent.
}

// DirectiveProgress reports in-flight execution status for a directive.
message DirectiveProgress {
  string directive_id = 1; // directive_id identifies which control-plane directive this progress references.
  string phase = 2; // phase is an implementation-defined state label (for example: "draining", "downloading").
  uint32 percent = 3; // percent is optional coarse completion percentage in [0, 100].
  string message = 4; // message provides operator-readable progress details.
  int64 updated_unix = 5; // updated_unix is when this progress snapshot was emitted.
}

// DirectiveResult reports final completion state for a directive.
message DirectiveResult {
  string directive_id = 1; // directive_id identifies which control-plane directive this result references.
  DirectiveResultStatus status = 2; // status reports final completion outcome.
  string message = 3; // message provides terminal details, including failure context.
  int64 completed_unix = 4; // completed_unix is when final completion was reached.
  bool rollback_applied = 5; // rollback_applied indicates whether rollback logic executed.
}

// DirectiveResultStatus enumerates final directive execution outcomes.
enum DirectiveResultStatus {
  DIRECTIVE_RESULT_STATUS_UNSPECIFIED = 0;
  DIRECTIVE_RESULT_STATUS_SUCCEEDED = 1;
  DIRECTIVE_RESULT_STATUS_FAILED = 2;
  DIRECTIVE_RESULT_STATUS_CANCELLED = 3;
}
