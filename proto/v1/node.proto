syntax = "proto3";

package spacescale.v1;

option go_package = "github.com/spacescale/core/shared/pb/v1;pb";

message NodeHeartbeat {
  string node_id = 1;           // Who am I?
  uint64 seq_no = 2;            // Am I dropping packets?
  string boot_id = 3;           // Did I suddenly reboot?
  int64 sent_at_unix_nano = 4;  // Is there network lag?
  string region = 5;            // Provisioned placement region for this node.
}
