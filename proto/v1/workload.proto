syntax = "proto3";

package spacescale.v1;

option go_package = "github.com/spacescale/core/internal/shared/pb/v1;pb";

// CpuMode describes how guest CPUs map onto the host.
enum CpuMode {
  CPU_MODE_UNSPECIFIED = 0;
  CPU_MODE_SHARED = 1;
  CPU_MODE_PINNED = 2;
}

// MicroVMShape is the resolved runtime shape sent to the edge.
message MicroVMShape {
  uint32 vcpu = 1;
  uint64 ram_mb = 2;
  CpuMode cpu_mode = 3;
  uint64 volume_mb = 4;
}

// Broadcast by the CP to all nodes in a region.
// Subject: node.auction.<region>.microvm
message AuctionRequest {
  string microvm_id = 1;
  MicroVMShape shape = 2;
}

// Fired back by eligible scaled daemons if they have physical capacity.
// NATS Request-Reply handles the routing back to the CP.
message AuctionReply {
  string microvm_id = 1;      // Correlates the bid to the exact request
  string node_id = 2;         // Permanent daemon identity
  string boot_id = 3;         // Target ID for the subsequent launch command
  uint64 free_ram_mb = 4;     // The Tie-Breaker: CP picks the emptiest node
}

// Sent directly to the winning node's personal inbox.
// Subject: node.cmd.<boot_id>.microvm.launch
message MicroVMLaunchRequest {
  string microvm_id = 1;
  MicroVMShape shape = 2;
  string image_ref = 3;
  map<string, string> env = 4;
  uint32 runtime_port = 5;
}

// Returned by the scaled daemon to acknowledge the launch intent.
message MicroVMLaunchResponse {
  string microvm_id = 1;
  bool accepted = 2;          // True if the Ghost Reservation was successful
  string status = 3;          // e.g., "starting", "failed"
  string error_message = 4;
}
