description: "## Create Project \n\nCreate a new project for the authenticated user \n\n### Endpoint\n- **Method**: `POST`\n- **Path**: `/v0/projects`\n\nThe API now expects:\n- `Authorization: Bearer <BFF_JWT_TOKEN>`\n\nThe bearer token must be signed by the trusted BFF signer secret (`BFF_JWT_SECRET`) and include valid claims.\n\n### Required JWT Claims\nThe API middleware validates these fields before the handler runs:\n- `sub`: stable user subject identifier (non-empty)\n- `github_id`: GitHub user id used for user/project ownership bootstrap (non-empty)\n- `iss`: must match API config `BFF_JWT_ISSUER` (default `spacescale-web-bff`)\n- `aud`: must include API audience `BFF_JWT_AUDIENCE` (default `spacescale-api`)\n- `exp`: must not be expired\n\nOptional claims accepted and carried in principal context:\n- `email`\n- `name`\n- `avatar_url`\n\n### Header Contract\n- `Authorization` (required): `Bearer ${[ BFF_TOKEN ]}`\n- `Content-Type` (required for JSON body): `application/json`\n\n### Body Contract (Optional)\nRequest body may be empty (`{}`), or contain user-provided overrides:\n\n```json\n{\n  \"name\": \"killer instinct\",\n  \"region\": \"global\"\n}\n```\n\n\n### Success Response\n- **Status**: `201 Created`\n- **Headers**: includes `Location: /v0/projects/{id}`\n- **Body example**:\n\n```json\n{\n  \"id\": \"d55f7b8e-8c2e-4f8f-8be0-e2eb39d3b8ee\",\n  \"name\": \"killer instinct\",\n  \"slug\": \"killer-instinct\",\n  \"region\": \"global\",\n  \"createdAt\": \"2026-02-09T12:34:56Z\",\n  \"updatedAt\": \"2026-02-09T12:34:56Z\"\n}\n```\n\n### Error Responses\n- `400 Bad Request`\n  - malformed JSON\n  - request fields fail service validation\n- `401 Unauthorized`\n  - missing Authorization header\n  - malformed Bearer header\n  - invalid signature / wrong issuer / wrong audience / expired token\n  - missing required identity claims (`sub`, `github_id`)\n- `409 Conflict`\n  - slug collision after retry budget exhausted (rare)\n- `500 Internal Server Error`\n  - unexpected storage/runtime failure\n\n### cURL Examples\nMinimal create with defaults:\n\n```bash\ncurl -i -X POST \"http://localhost:8080/v0/projects\" \\\n  -H \"Authorization: Bearer $BFF_TOKEN\" \\\n  -H \"Content-Type: application/json\" \\\n  -d '{}'\n```\n\nCreate with explicit values:\n\n```bash\ncurl -i -X POST \"http://localhost:8080/v0/projects\" \\\n  -H \"Authorization: Bearer $BFF_TOKEN\" \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"name\":\"killer instinct\",\"region\":\"global\"}'\n```"
