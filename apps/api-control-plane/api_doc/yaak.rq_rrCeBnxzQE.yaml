description: |-
  ## Create Project

  Create a new project inside one workspace owned by the authenticated user.

  ### Endpoint
  - **Method**: `POST`
  - **Path**: `/v0/workspaces/{workspaceId}/projects`

  ### Authentication
  - `Authorization: Bearer <BFF_JWT_TOKEN>`
  - token must be signed with trusted BFF secret (`BFF_JWT_SECRET`)
  - user must already exist in API users table (seed via `POST /v0/internal/auth-sync`)

  ### Path Parameters
  - `workspaceId` (required): UUID of a workspace owned by the caller
  - `workspaceId` must map to a workspace belonging to the bearer token identity

  ### Required JWT Claims
  - `sub`: required and must be non-empty
  - `identity_key`: required stable caller identity key
  - `iss`: must match `BFF_JWT_ISSUER` (default `spacescale-web-bff`)
  - `aud`: must include `BFF_JWT_AUDIENCE` (default `spacescale-api`)
  - `exp`: must be present and in the future

  Optional claims accepted and carried in principal context:
  - `email`
  - `name`
  - `avatar_url`

  ### Header Contract
  - `Authorization` (required): `Bearer ${[ BFF_TOKEN ]}`
  - `Content-Type` (required for JSON body): `application/json`

  ### Body Contract (Optional)
  Request body may be empty (`{}`), or contain user-provided overrides:

  ```json
  {
    "name": "killer instinct",
    "region": "global"
  }
  ```

  ### Success Response
  - **Status**: `201 Created`
  - **Headers**: includes `Location: /v0/workspaces/{workspaceId}/projects/{id}`

  ### Error Responses
  - `400 Bad Request`: malformed JSON or invalid input
  - `401 Unauthorized`: missing/invalid bearer token, invalid claims, or workspace ownership mismatch
  - `429 Too Many Requests`: per-user API rate limit exceeded
  - `409 Conflict`: slug collision after retries
  - `500 Internal Server Error`: unexpected runtime error
