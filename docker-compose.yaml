services:
  api:
    build:
      context: ./apps/api
    env_file:
      - ./.env.local
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:18-alpine
    env_file:
      - ./.env.local
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql # PG 18+ recommends mounting parent dir for pg_upgrade
      - ./apps/db/init:/docker-entrypoint-initdb.d:ro # run init scripts on first boot
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-spacescale} -d $${POSTGRES_DB:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped


volumes:
  pgdata:
