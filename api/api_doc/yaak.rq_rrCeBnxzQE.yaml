description: |-
  ## Create Project
  Creates a new project for the current user. If no name is provided, the server generates one from the `name_words` dictionary and applies a URL-safe slug.

  **Endpoint**: `POST /v0/projects`

  ### Headers
  - `X-User-Github-ID` (required): user identity for ownership

  ### Body (optional)
  ```json
  {
    "name": "misty-harbor",
    "region": "global"
  }
  ```

  If omitted, the server generates a name and defaults `region` to `global`.

  ### Responses
  - `201 Created`: project created
  - `400 Bad Request`: invalid input or malformed JSON
  - `401 Unauthorized`: missing `X-User-Github-ID`
  - `409 Conflict`: slug collision after retries (rare)
  - `500 Internal Server Error`: unexpected error

  ### Example
  ```bash
  curl -i -X POST "http://localhost:8080/v0/projects"   -H "X-User-Github-ID: 12345"   -H "Content-Type: application/json"   -d '{}'
  ```

  **Notes**
  - The response includes a `Location` header: `/v0/projects/{id}`
  - Project names are auto-generated unless provided.
