name: scaled

on:
  push:
    branches: [main]
    paths:
      - "apps/scaled/**"
      - "packages/proto-go/**"
      - "contracts/proto/**"
      - ".github/workflows/scaled.yaml"
  pull_request:
    branches: [main, dev]
    paths:
      - "apps/scaled/**"
      - "packages/proto-go/**"
      - "contracts/proto/**"
      - ".github/workflows/scaled.yaml"

jobs:
  test:
    name: Scaled - Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/scaled
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: apps/scaled/go.mod
          cache: true

      - name: Verify module files are tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Run tests with race detection
        run: go test -race ./...
