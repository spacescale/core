name: api

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, dev]

jobs:
  backend-test:
    name: Test
    runs-on: ubuntu-latest
    env:
      TEST_DATABASE_URL: postgres://spacescale:spacescale_dev_pass@localhost:5432/spacescale_test?sslmode=disable
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: spacescale
          POSTGRES_PASSWORD: spacescale_dev_pass
          POSTGRES_DB: spacescale_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U spacescale -d spacescale_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: apps/api/go.mod
          cache: "true"

      - name: Install goose
        run: go install github.com/pressly/goose/v3/cmd/goose@v3.25.0

      - name: Apply migrations
        working-directory: .
        run: $(go env GOPATH)/bin/goose -dir apps/db/migrations postgres "$TEST_DATABASE_URL" up

      - name: Run tests with race detection
        run: go test -race ./... -coverprofile=coverage.out -covermode=atomic

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./apps/api/coverage.out
          flags: api # group and filter coverage by component
