name: opencode

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, edited]

jobs:
  opencode:
    if: >-
      ${{ github.event_name == 'pull_request' ||
        github.event_name == 'issues' ||
        contains(github.event.comment.body, '/oc') ||
        contains(github.event.comment.body, '/opencode') }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: opencode/minimax-m2.5-free
          use_github_token: true
          prompt: |
            Review only the pull request diff.

            Be strictly concise and report only relevant high-signal issues.

            Output format (strict):
            | Severity | Issue | Location | Recommendation |
            | --- | --- | --- | --- |

            Rules:
            - Focus on Security, Correctness, and Reliability issues.
            - Skip style nits, optional refactors, and speculative concerns.
            - Use severities: Critical, High, Medium, Low, Info.
            - Keep each row to one concise issue and one actionable fix.
            - If no significant issues exist, output exactly: No significant issues found.
