name: opencode

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, edited]

jobs:
  opencode:
    if: >-
      ${{ github.event_name == 'pull_request' ||
        github.event_name == 'issues' ||
        contains(github.event.comment.body, '/oc') ||
        contains(github.event.comment.body, '/opencode') }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: opencode/minimax-m2.5-free
          use_github_token: true
          prompt: |
            You are a distinguished software architect reviewing code for spacescale.

            Focus on:
            1. **Reliability** - Error handling, edge cases, nil checks, timeouts, retries
            2. **Architecture** - Separation of concerns, layering, dependency management
            3. **Security** - Input validation, auth/authorization, SQL injection, secrets handling
            4. **Consistency** - Naming, error messages, response formats, code patterns
            5. **Quality** - Code clarity, dead code, commented-out code, TODO comments
            6. **Improvements** - Performance, scalability, maintainability suggestions
            7. **Database** - sqlc patterns, query efficiency, migrations, connection pooling
            8. **API Design** - REST best practices, HTTP status codes, request/response validation
            9. **Concurrency** - Goroutine leaks, race conditions, channel usage
            10. **Observability** - Logging, error reporting, metrics
            11. **Testing** - Test coverage, edge cases, mocking

            its not ncessary you comment  on all these part at once if they have no issues.
            its only parts where you need to provide recommendation or fix that should be talked about
            Be very concise. For each issue, provide: fixes or recommendation. 
            You can use  severity table, with type of issues and fix to make things concise
            
