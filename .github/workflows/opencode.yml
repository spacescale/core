name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: >-
      ${{ contains(github.event.comment.body, '/oc') ||
        contains(github.event.comment.body, '/opencode') }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: anomalyco/opencode/github@latest
        env:
          OPENAI_API_KEY: ${{ secrets.OPEN_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: openai/gpt-5.2
          use_github_token: true
          prompt: |
            Review only the current PR diff (or issue comment context).
            Keep the response concise.
            For PRs, report blocker/warning issues with file path and one-line fix.
            If no blocking issue exists, reply exactly: "LGTM - no blocking issues in current diff."
