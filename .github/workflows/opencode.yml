name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: >-
      ${{ contains(github.event.comment.body, '/oc') ||
        contains(github.event.comment.body, '/opencode') }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: anomalyco/opencode/github@latest
        env:
          OPENAI_API_KEY: ${{ secrets.OPEN_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: openai/gpt-4.1-mini
          use_github_token: true
          prompt: |
            Review this request from a GitHub comment.

            For PR comments:
            - Review ONLY the current PR diff and changed files.
            - Do NOT review the full repository.
            - Open extra files only when strictly required to understand a changed hunk.
            - Prioritize correctness, security, regressions, and missing tests.

            PR output constraints:
            - Keep response under 220 words.
            - Use at most 8 bullets total.
            - Each finding must include severity (blocker|warning|nit), file path, and a one-line fix.
            - If no material issues, reply exactly: "LGTM - no blocking issues in current diff."
            - If you already commented on this thread, add only new findings (no repetition).

            For issue comments:
            - Provide a concise implementation plan in 3-5 bullets.
            - Keep response under 140 words.

            Do not use internet browsing unless explicitly requested in the triggering comment/issue.
