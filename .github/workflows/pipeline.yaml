name: Core

on:
  push:
    branches: [main]
    tags: [v*]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  test:
    name: test
    runs-on: ubuntu-latest
    needs: lint
    env:
      TEST_DATABASE_URL: postgres://admin:admin@localhost:5432/ci_db?sslmode=disable
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: ci_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U admin -d ci_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: test
        run: |
          go install github.com/pressly/goose/v3/cmd/goose@v3.25.0
          $(go env GOPATH)/bin/goose -dir control/db/migrations postgres "$TEST_DATABASE_URL" up
          go test -race ./...

  build:
    name: build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: build
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/controlp ./cmd/controlp
          GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/scaled ./cmd/scaled
