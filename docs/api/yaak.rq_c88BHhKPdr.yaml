description: |-
  ## WorkOS Logout

  Clear the current WorkOS session and send the browser through provider logout.

  ### Endpoint
  - **Method**: `GET`
  - **Path**: `/auth/logout`

  ### Behavior
  - clears the `spacescale_session` cookie locally
  - attempts provider logout when the sealed session is still valid
  - redirects back to the configured logout target

  ### Notes
  - use this in a browser, not the Yaak request runner
  - the redirect target is `http://localhost:8080/healthz` in local development
