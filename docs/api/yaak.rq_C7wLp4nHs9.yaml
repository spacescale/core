description: |-
  ## Get Project

  Return one project by id within one workspace scope.

  ### Endpoint
  - **Method**: `GET`
  - **Path**: `/v1/workspaces/{workspaceId}/projects/{projectId}`

  ### Path Parameters
  - `workspaceId` (required): workspace UUID
  - `projectId` (required): project UUID

  ### Authentication
  - `Cookie: spacescale_session=${[ WORKOS_SESSION ]}`

  ### Behavior
  - both ownership and workspace/project relationship are validated
  - a project in a different workspace is treated as unauthorized

  ### Success Response
  - **Status**: `200 OK`
  - **Body**:
    - `id`
    - `workspaceId`
    - `name`
    - `slug`
    - `createdAt`
    - `updatedAt`

  ### Error Responses
  - `400 Bad Request`: invalid UUID path params
  - `401 Unauthorized`: token invalid or resource not owned by caller
  - `429 Too Many Requests`: per-user API rate limit exceeded
  - `500 Internal Server Error`: unexpected runtime error
