description: |-
  ## Create Project

  Create a new project inside one workspace owned by the authenticated user.

  ### Endpoint
  - **Method**: `POST`
  - **Path**: `/v1/workspaces/{workspaceId}/projects`

  ### Authentication
  - `Cookie: spacescale_session=${[ WORKOS_SESSION ]}`
  - caller must already have a valid WorkOS session cookie

  ### Path Parameters
  - `workspaceId` (required): UUID of a workspace owned by the caller
  - `workspaceId` must map to a workspace belonging to the caller session

  ### Header Contract
  - `Cookie` (required): `spacescale_session=${[ WORKOS_SESSION ]}`
  - `Content-Type` (required for JSON body): `application/json`

  ### Body Contract (Optional)
  Request body may be empty (`{}`), or contain user-provided overrides:

  ```json
  {
    "name": "killer instinct"
  }
  ```

  ### Success Response
  - **Status**: `201 Created`
  - **Headers**: includes `Location: /v1/workspaces/{workspaceId}/projects/{id}`

  ### Error Responses
  - `400 Bad Request`: malformed JSON or invalid input
  - `401 Unauthorized`: missing/invalid session cookie or workspace ownership mismatch
  - `429 Too Many Requests`: per-user API rate limit exceeded
  - `409 Conflict`: slug collision after retries
  - `500 Internal Server Error`: unexpected runtime error
