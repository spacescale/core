description: |-
  Delete one project inside one workspace.

  ### Endpoint
  - **Method**: `DELETE`
  - **Path**: `/v1/workspaces/{workspaceId}/projects/{projectId}`

  ### Path Parameters
  - `workspaceId` (required): workspace UUID
  - `projectId` (required): project UUID

  ### Authentication
  - `Cookie: spacescale_session=${[ WORKOS_SESSION ]}`

  ### Behavior
  - operation is ownership-scoped to the caller
  - project delete cascades to dependent rows via DB constraints

  ### Success Response
  - **Status**: `204 No Content`
  - empty response body

  ### Error Responses
  - `400 Bad Request`: invalid UUID path params
  - `401 Unauthorized`: missing/invalid session cookie or resource not owned by caller
  - `429 Too Many Requests`: per-user API rate limit exceeded
  - `500 Internal Server Error`: unexpected runtime error
