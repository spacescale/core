description: |-
  ## List Workloads In Project

  Return workloads for one caller-owned project inside one caller-owned workspace.

  ### Endpoint
  - **Method**: `GET`
  - **Path**: `/v1/workspaces/{workspaceId}/projects/{projectId}/workloads`

  ### Authentication
  - `Cookie: spacescale_session=${[ WORKOS_SESSION ]}`

  ### Path Parameters
  - `workspaceId` (required): workspace UUID owned by caller
  - `projectId` (required): project UUID owned by caller and scoped to workspace

  ### Success Response
  - **Status**: `200 OK`
  - **Body**:

  ```json
  {
    "workloads": [
      {
        "id": "uuid",
        "projectId": "uuid",
        "name": "manual-e2e",
        "slug": "manual-e2e",
        "subdomain": "manual-e2e",
        "imageRef": "ghcr.io/acme/spacescale-api:latest",
        "targetReplicas": 1,
        "primaryRegion": "eu-central",
        "runtimePort": 8080,
        "status": "queued",
        "isPublic": false,
        "createdAt": "RFC3339",
        "updatedAt": "RFC3339"
      }
    ]
  }
  ```

  ### Error Responses
  - `400 Bad Request`: invalid path input
  - `401 Unauthorized`: token invalid or project not owned by caller
  - `429 Too Many Requests`: per-user API rate limit exceeded
  - `500 Internal Server Error`: unexpected runtime error
