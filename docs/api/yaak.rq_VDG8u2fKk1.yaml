description: |-
  ## WorkOS Login

  Start the browser login flow and let the API set the `spacescale_session` cookie.

  ### Endpoint
  - **Method**: `GET`
  - **Path**: `/auth/login`

  ### Behavior
  - this route redirects to WorkOS AuthKit
  - open it in a browser, not the Yaak request runner
  - after successful callback, use the resulting `spacescale_session` cookie for `/v1/...` requests

  ### Notes
  - `auth/callback` is handled by the browser redirect after WorkOS completes authentication
  - if you need a fresh session, clear the cookie and re-run the browser flow
