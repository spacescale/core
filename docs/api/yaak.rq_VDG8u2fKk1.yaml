description: |-
  ## Internal Auth Sync

  Upsert a user profile by stable `identityKey` for trusted server-to-server auth flows.

  ### Endpoint
  - **Method**: `POST`
  - **Path**: `/v1/internal/auth-sync`

  ### Security
  - route is intended for private-network service traffic
  - requires header `X-Internal-Auth: ${[ INTERNAL_AUTH_SYNC_SECRET ]}`
  - applies global circuit-breaker and per-identity rate limiting

  ### Validation
  - `identityKey` is required and must be <= 512 chars
  - optional fields are sanitized (invalid optional values are dropped)

  ### Success Response
  - **Status**: `200 OK`
  - body includes:
    - `id`
    - `onboardingCompleted`

  ### Error Responses
  - `400 Bad Request`: invalid JSON or invalid input
  - `401 Unauthorized`: missing/invalid internal secret
  - `429 Too Many Requests`: per-identity internal rate limit exceeded
  - `500 Internal Server Error`: unexpected runtime error
