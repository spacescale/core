description: |-
  ## List Projects In Workspace

  Return projects for one caller-owned workspace.

  ### Endpoint
  - **Method**: `GET`
  - **Path**: `/v1/workspaces/{workspaceId}/projects`

  ### Path Parameters
  - `workspaceId` (required): UUID of the workspace scope

  ### Authentication
  - `Authorization: Bearer <BFF_JWT_TOKEN>`

  ### Success Response
  - **Status**: `200 OK`
  - **Body**:

  ```json
  {
    "projects": [
      {
        "id": "uuid",
        "workspaceId": "uuid",
        "name": "project-name",
        "slug": "project-slug",
        "createdAt": "RFC3339",
        "updatedAt": "RFC3339"
      }
    ]
  }
  ```

  ### Error Responses
  - `400 Bad Request`: invalid `workspaceId`
  - `401 Unauthorized`: token invalid or workspace not owned by caller
  - `429 Too Many Requests`: per-user API rate limit exceeded
  - `500 Internal Server Error`: unexpected runtime error
