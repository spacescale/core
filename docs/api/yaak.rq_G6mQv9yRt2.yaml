description: |-
  ## Health Check

  Lightweight liveness/readiness endpoint for the API process.

  ### Endpoint
  - **Method**: `GET`
  - **Path**: `/healthz`

  ### Authentication
  - none required

  ### Behavior
  - API performs a database ping before returning success
  - endpoint is intended for local checks, uptime probes, and container health checks

  ### Success Response
  - **Status**: `200 OK`
  - empty response body

  ### Failure Response
  - **Status**: `503 Service Unavailable`
  - returned when database connectivity check fails
  - empty response body

  ### Notes
  - this route is outside `/v1` and does not require bearer auth
  - use this first when debugging local startup (`make cp`)
