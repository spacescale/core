description: |-
  ## Update Project

  Update mutable project fields inside one workspace.

  ### Endpoint
  - **Method**: `PATCH`
  - **Path**: `/v0/workspaces/{workspaceId}/projects/{projectId}`

  ### Path Parameters
  - `workspaceId` (required): workspace UUID
  - `projectId` (required): project UUID

  ### Authentication
  - `Authorization: Bearer <BFF_JWT_TOKEN>`

  ### Body Contract
  - at least one field is required:
    - `name` (optional)
    - `region` (optional)
  - project slug is immutable in this endpoint

  Example:

  ```json
  {
    "name": "renamed-project",
    "region": "global"
  }
  ```

  ### Success Response
  - **Status**: `200 OK`
  - **Body**:
    - `id`
    - `workspaceId`
    - `name`
    - `slug`
    - `region`
    - `createdAt`
    - `updatedAt`

  ### Error Responses
  - `400 Bad Request`: invalid JSON, empty patch body, or invalid UUID path params
  - `401 Unauthorized`: token invalid or resource not owned by caller
  - `429 Too Many Requests`: per-user API rate limit exceeded
  - `500 Internal Server Error`: unexpected runtime error
