description: |-
  Delete one workspace by id.

  ### Endpoint
  - **Method**: `DELETE`
  - **Path**: `/v1/workspaces/{workspaceId}`

  ### Path Parameters
  - `workspaceId` (required): UUID of the workspace to delete

  ### Authentication
  - `Cookie: spacescale_session=${[ WORKOS_SESSION ]}`

  ### Behavior
  - operation is ownership-scoped (caller must own workspace)
  - workspace delete cascades to child records through DB foreign keys

  ### Success Response
  - **Status**: `204 No Content`
  - empty response body

  ### Error Responses
  - `400 Bad Request`: invalid `workspaceId`
  - `401 Unauthorized`: token invalid or workspace not owned by caller
  - `429 Too Many Requests`: per-user API rate limit exceeded
  - `500 Internal Server Error`: unexpected runtime error
