description: |-
  ## Create Workspace

  Create a new workspace for the authenticated user.

  ### Endpoint
  - **Method**: `POST`
  - **Path**: `/v1/workspaces`

  ### Authentication
  - `Cookie: spacescale_session=${[ WORKOS_SESSION ]}`
  - caller must already have a valid WorkOS session cookie

  ### Body Contract
  - `name` (required): workspace display name
  - value is trimmed and must be non-empty
  - duplicate names are blocked per user

  Example:

  ```json
  {
    "name": "workspace-01"
  }
  ```

  ### Success Response
  - **Status**: `201 Created`
  - **Headers**: includes `Location: /v1/workspaces/{id}`
  - **Body**:
    - `id`
    - `name`
    - `createdAt`
    - `updatedAt`

  ### Error Responses
  - `400 Bad Request`: invalid JSON or invalid input
  - `401 Unauthorized`: missing/invalid session cookie
  - `409 Conflict`: workspace name conflict for caller
  - `429 Too Many Requests`: per-user API rate limit exceeded
  - `500 Internal Server Error`: unexpected runtime error
