description: |-
  ## Get Workspace

  Return one workspace by id when it belongs to the authenticated user.

  ### Endpoint
  - **Method**: `GET`
  - **Path**: `/v1/workspaces/{workspaceId}`

  ### Path Parameters
  - `workspaceId` (required): UUID of the workspace to fetch

  ### Authentication
  - `Cookie: spacescale_session=${[ WORKOS_SESSION ]}`

  ### Success Response
  - **Status**: `200 OK`
  - **Body**:
    - `id`
    - `name`
    - `createdAt`
    - `updatedAt`

  ### Error Responses
  - `400 Bad Request`: invalid `workspaceId`
  - `401 Unauthorized`: token invalid or workspace not owned by caller
  - `429 Too Many Requests`: per-user API rate limit exceeded
  - `500 Internal Server Error`: unexpected runtime error
