description: |-
  ## Bootstrap Defaults

  Bootstrap default resources for an authenticated user.

  This endpoint is idempotent and intended for first-login onboarding flows.

  ### Endpoint
  - **Method**: `POST`
  - **Path**: `/v1/bootstrap-defaults`

  ### Authentication
  - `Cookie: spacescale_session=${[ WORKOS_SESSION ]}`
  - caller must already have a valid WorkOS session cookie

  ### Request Body
  - empty body is allowed
  - `{}` is also valid
  - malformed JSON returns `400 invalid json`

  ### Behavior
  - if caller has **no workspace**:
    - creates workspace `workspace-01`
    - creates one default project in that workspace
  - default project name is generated adjective-noun style
  - default project slug uses generated name and retries on slug conflicts
  - if caller already has any workspace:
    - no-op response with `created=false`

  ### Success Response
  - **Status**: `200 OK`
  - **Body**:

  ```json
  {
    "created": true,
    "workspaceId": "uuid",
    "projectId": "uuid"
  }
  ```

  idempotent no-op response:

  ```json
  {
    "created": false
  }
  ```

  ### Error Responses
  - `400 Bad Request`: invalid JSON or invalid input
  - `401 Unauthorized`: missing/invalid session cookie
  - `409 Conflict`: project slug collision after retry budget is exhausted
  - `429 Too Many Requests`: per-user API rate limit exceeded
  - `500 Internal Server Error`: unexpected runtime error
