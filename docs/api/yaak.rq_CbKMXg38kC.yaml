description: |-
  ## Local API Flow

  This info request documents the current Yaak flow for the running local API.

  ### Runtime Prerequisites
  1. Start DB + NATS:

  ```bash
  make db
  ```

  2. Start the control plane API in another terminal.

  3. For full app placement tests, make sure at least one `scaled` node is already bootstrapped and connected in the same region you will use for app creation.

  Common dev flow for the manual node:

  `scaled` is Linux-only and bootstraps over NATS, not HTTP.

  4. Refresh the Yaak environment before opening requests.

  ### Current Route Prefixes
  - health: `/healthz`
  - internal route: `/v1/internal/auth-sync`
  - authenticated user routes: `/v1/...`

  ### Yaak Environment Notes
  - `LOCAL` contains the variables Yaak requests expect
  - `BFF_TOKEN`, `WORKSPACE_ID`, and `PROJECT_ID` must be refreshed manually when the token expires, the DB is reset, or bootstrap state changes
  - `PRIMARY_REGION` defaults to `eu-central` for the current manual node path

  ### Recommended Request Order In Yaak
  1. `Health Check`
  2. `Internal Auth Sync`
  3. `Bootstrap Defaults`
  4. `List Workspaces`
  5. `List Projects In Workspace`
  6. `Create App`
  7. `List Apps`

  ### Important For Create App
  - `compute` is required with `vcpu`, `memoryMb`, and `dedicated`
  - `primaryRegion` is required
  - for the live end-to-end flow, use `primaryRegion=eu-central`
  - the app create request will only dispatch successfully if a bootstrapped `scaled` node is actively bidding in that region
  - if no active node is bidding in that region, API returns `503 no capacity available`

  ### Expected Happy Path
  - `Create App` returns `201 Created`
  - response status is `deploying` when dispatch succeeds
  - `scaled` logs:
    - `submitted bid`
    - `won placement auction`

  ### Useful Recovery Note
  - `Bootstrap Defaults` is idempotent
  - when it returns `{ "created": false }`, keep using `List Workspaces` and `List Projects In Workspace` to refresh ids instead of expecting `workspaceId` / `projectId` in that response
