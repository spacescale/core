description: |-
  ## Local Token and API Testing

  This info request documents the standard local API testing flow.

  ### Runtime Prerequisites (README-aligned)
  - from repo root, start local API + DB with:

  ```bash
  make run
  ```

  - run API tests with:

  ```bash
  make test
  ```

  - stop local DB container with:

  ```bash
  make stop
  ```

  ### Why this exists
  - Next.js BFF usually issues the API token
  - for direct API checks (Yaak/curl), use `make mint` to generate a short-lived JWT

  ### `.env.local` requirements
  The `make mint` target reads values from repo-root `.env.local`.

  Required keys:
  - `BFF_JWT_SECRET` (HMAC signing secret, must match API runtime secret)
  - `BFF_IDENTITY_KEY` (stable identity key used by API)

  Optional keys:
  - `BFF_JWT_ISSUER` (default: `spacescale-web-bff`)
  - `BFF_JWT_AUDIENCE` (default: `spacescale-api`)
  - `BFF_JWT_TTL_SECONDS` (default: `3600`)
  - `BFF_SUBJECT_HASH_SECRET` (subject hash source)
  - `NEXTAUTH_SECRET` (used as subject hash fallback)
  - `BFF_JWT_EMAIL`
  - `BFF_JWT_NAME`
  - `BFF_JWT_AVATAR_URL`

  ### `.env.local` example

  ```env
  BFF_JWT_SECRET=replace-with-strong-secret
  BFF_JWT_ISSUER=spacescale-web-bff
  BFF_JWT_AUDIENCE=spacescale-api
  BFF_IDENTITY_KEY=email:you@example.com
  BFF_SUBJECT_HASH_SECRET=replace-with-stable-secret
  BFF_JWT_TTL_SECONDS=3600
  BFF_JWT_EMAIL=you@example.com
  BFF_JWT_NAME=Dev User
  BFF_JWT_AVATAR_URL=https://example.com/avatar.png
  ```

  ### Mint command

  ```bash
  make mint
  ```

  Output is one HS256 JWT on stdout.
  Token payload includes:
  - `sub` as opaque `github:v2:<hash>`
  - `identity_key` as explicit stable identity key

  ### Use token in Yaak
  1. Copy output from `make mint`.
  2. Open Yaak environment `LOCAL`.
  3. Set `BFF_TOKEN=<pasted-token>`.
  4. Protected requests use:
     - `Authorization: Bearer ${[ BFF_TOKEN ]}`

  ### Recommended first-call flow

  ```bash
  # 1) sync user (trusted internal route)
  curl -i -X POST "http://localhost:8080/v0/internal/auth-sync" \
    -H "X-Internal-Auth: <internal-secret>" \
    -H "Content-Type: application/json" \
    -d '{"identityKey":"email:you@example.com"}'

  # 2) bootstrap default workspace + project
  curl -i -X POST "http://localhost:8080/v0/bootstrap-defaults" \
    -H "Authorization: Bearer $BFF_TOKEN" \
    -H "Content-Type: application/json" \
    -d '{}'

  # 3) list workspaces
  curl -i "http://localhost:8080/v0/workspaces" \
    -H "Authorization: Bearer $BFF_TOKEN"
  ```

  ### JWT validation enforced by API middleware
  Required claims:
  - `sub` (non-empty)
  - `identity_key` (stable identity key)
  - `iss` matches `BFF_JWT_ISSUER`
  - `aud` matches `BFF_JWT_AUDIENCE`
  - `exp` is in the future

  Invalid claims or signature return `401 unauthorized`.

  ### Troubleshooting
  - `BFF_JWT_SECRET is required in .env.local`
    - add key and run `make mint` again
  - API returns `401 unauthorized`
    - re-mint token (expired tokens are common)
    - verify secret/issuer/audience values
    - verify header format `Authorization: Bearer <token>`
