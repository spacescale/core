description: |-
  ## Create App

  Create one app under a caller-owned workspace/project.

  ### Endpoint
  - **Method**: `POST`
  - **Path**: `/v1/workspaces/{workspaceId}/projects/{projectId}/apps`

  ### Authentication
  - `Authorization: Bearer <BFF_JWT_TOKEN>`
  - token must be signed by trusted BFF secret (`BFF_JWT_SECRET`)
  - caller identity must exist in API users table (seed via internal auth-sync)

  ### Path Parameters
  - `workspaceId` (required): workspace UUID owned by caller
  - `projectId` (required): project UUID owned by caller and scoped to workspace

  ### Body Contract
  - `imageRef` (required): OCI image reference
  - `compute` (required): requested microVM shape with `vcpu`, `memoryMb`, and `dedicated`
  - `primaryRegion` (required): placement region and must match an active node region for end-to-end dispatch
  - `name` (optional): display name; when omitted service derives from image ref
  - `runtimePort` (optional): defaults to `8080`
  - `isPublic` (optional): defaults to `false`
  - `registryCredentialId` (optional): must belong to same project when supplied
  - `envVars` (optional): list of env vars
    - max items per request: `50`
    - key format: shell-style uppercase identifier after normalization
    - values are encrypted before DB write
    - duplicate keys (after normalization) are rejected

  ### Behavior Notes
  - create operation persists app, deployment, microvm, optional registry binding, and encrypted env vars atomically
  - new apps default to `targetReplicas = 1`, so create currently launches one microvm
  - when dispatch is active, `scalecp` immediately runs auction + targeted launch after create
  - current manual node region is `eu-central`, so use `primaryRegion=eu-central` for the live end-to-end path

  ### Success Response
  - **Status**: `201 Created`
  - **Headers**: `Location: /v1/workspaces/{workspaceId}/projects/{projectId}/apps/{appId}`
  - **Body**:
    - `id`
    - `projectId`
    - `name`
    - `slug`
    - `subdomain`
    - `imageRef`
    - `targetReplicas`
    - `primaryRegion`
    - `runtimePort`
    - `status` (`deploying` when dispatch succeeds, `queued` only when no dispatcher is wired)
    - `isPublic`
    - `createdAt`
    - `updatedAt`

  ### Error Responses
  - `400 Bad Request`: invalid JSON or invalid input
  - `401 Unauthorized`: token invalid, caller missing, or ownership violation
  - `409 Conflict`: slug/subdomain collision or duplicate env key conflict
  - `503 Service Unavailable`: no auction bids / no capacity available
  - `413 Request Entity Too Large`: body exceeds configured max bytes
  - `429 Too Many Requests`: per-user API rate limit exceeded
  - `500 Internal Server Error`: unexpected runtime error
