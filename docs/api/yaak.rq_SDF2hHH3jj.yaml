description: |-
  Return all workspaces owned by the authenticated user.

  ### Endpoint
  - **Method**: `GET`
  - **Path**: `/v1/workspaces`

  ### Authentication
  - `Cookie: spacescale_session=${[ WORKOS_SESSION ]}`

  ### Behavior
  - response only includes caller-owned workspaces
  - results are ordered by creation time (`created_at ASC`, then `id ASC`)

  ### Success Response
  - **Status**: `200 OK`
  - **Body**:

  ```json
  {
    "workspaces": [
      {
        "id": "uuid",
        "name": "workspace-01",
        "createdAt": "RFC3339",
        "updatedAt": "RFC3339"
      }
    ]
  }
  ```

  ### Error Responses
  - `401 Unauthorized`: missing/invalid session cookie
  - `429 Too Many Requests`: per-user API rate limit exceeded
  - `500 Internal Server Error`: unexpected runtime error
