description: |-
  Update one workspace display name.

  ### Endpoint
  - **Method**: `PATCH`
  - **Path**: `/v1/workspaces/{workspaceId}`

  ### Path Parameters
  - `workspaceId` (required): UUID of the workspace to update

  ### Authentication
  - `Cookie: spacescale_session=${[ WORKOS_SESSION ]}`

  ### Body Contract
  - `name` (required): new workspace name
  - value is trimmed and must be non-empty

  ### Success Response
  - **Status**: `200 OK`

  ### Error Responses
  - `400 Bad Request`: invalid JSON, invalid input, or invalid `workspaceId`
  - `401 Unauthorized`: token invalid or workspace not owned by caller
  - `409 Conflict`: name conflicts with another caller-owned workspace
  - `429 Too Many Requests`: per-user API rate limit exceeded
  - `500 Internal Server Error`: unexpected runtime error
