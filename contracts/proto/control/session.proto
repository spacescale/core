syntax = "proto3";

package control.v1;

option go_package = "github.com/t0gun/spacescale/packages/go/pb/v1;controlpb";

import "contracts/proto/control/directives.proto";

// HealthRequest is the lightweight readiness probe sent before opening the
// long-lived control stream.
message HealthRequest {
  string request_id = 1; // request_id is an optional correlation id for distributed tracing.
}

// HealthResponse reports current control-plane status.
message HealthResponse {
  bool ok = 1; // ok indicates whether the control plane is currently ready.
  string status = 2; // status is a compact readiness label (for example: "ready", "degraded").
  string control_plane_version = 3; // control_plane_version identifies the serving build/version.
  int64 started_unix = 4; // started_unix is the control-plane process start time in unix seconds.
  string message = 5; // message provides human-readable details for logs and diagnostics.
}

// AgentSessionRequest is an envelope for agent-to-control stream events.
// Exactly one event payload should be set per message.
message AgentSessionRequest {
  string request_id = 1; // request_id is optional, may be echoed by responses, and helps stream log correlation.

  oneof event {
    RegisterRequest register = 2; // register starts a new logical control session.
    HeartbeatRequest heartbeat = 3; // heartbeat updates liveness and runtime load signals.
    DirectiveAck directive_ack = 4; // directive_ack reports immediate accept/reject for a directive.
    DirectiveProgress directive_progress = 5; // directive_progress reports in-flight execution state.
    DirectiveResult directive_result = 6; // directive_result reports final directive completion status.
  }
}

// AgentSessionResponse is an envelope for control-to-agent stream events.
// Exactly one event payload should be set per message.
message AgentSessionResponse {
  string request_id = 1; // request_id echoes the originating AgentSessionRequest.request_id when present.

  oneof event {
    RegisterResponse register = 2; // register returns accepted identity and heartbeat lease settings.
    HeartbeatResponse heartbeat = 3; // heartbeat acknowledges liveness updates from the agent.
    NodeDirective node_directive = 4; // node_directive carries host-level commands on the main control stream.
    AgentDirective agent_directive = 5; // agent_directive carries process-level commands on the main control stream.
    WorkloadDirective workload_directive = 6; // workload_directive carries workload/VM commands on the main control stream.
  }
}

// RegisterRequest announces agent identity at session start.
//
// Security and stability notes:
// - agent_id should be the previously provisioned UUID returned by RegisterResponse.
// - leave agent_id empty on first boot so the control plane can provision one.
message RegisterRequest {
  string agent_id = 1; // agent_id is the canonical control-plane identity for this agent; omit on first boot to request provisioning.
  string agent_version = 2; // agent_version identifies the running agent build/version.
  int64 started_unix = 3; // started_unix is the agent process start time in unix seconds.
}

// RegisterResponse communicates registration acceptance and lease policy.
message RegisterResponse {
  bool accepted = 1; // accepted indicates whether registration is admitted.
  string agent_id = 2; // agent_id is the canonical control-plane identity for this agent.
  string session_id = 3; // session_id identifies this stream session for heartbeat correlation.
  int64 heartbeat_interval_seconds = 4; // heartbeat_interval_seconds is the expected heartbeat cadence.
  int64 lease_ttl_seconds = 5; // lease_ttl_seconds is the offline cutoff if heartbeats are missed.
  string message = 6; // message provides human-readable acceptance or rejection details.
  string agent_name = 7; // agent_name is the control-plane assigned display name for this agent.
}

// HeartbeatRequest updates liveness and runtime pressure for an active session.
message HeartbeatRequest {
  string session_id = 1; // session_id must match the RegisterResponse session id.
  int64 sent_unix = 2; // sent_unix is when heartbeat was emitted by the agent in unix seconds.
  string status = 3; // status is a compact runtime label (for example: "ready", "draining").
  uint32 running_workloads = 4; // running_workloads is the count of active workloads.
  uint32 queued_workloads = 5; // queued_workloads is the count of pending workloads.
}

// HeartbeatResponse acknowledges a heartbeat and conveys server time.
message HeartbeatResponse {
  bool ok = 1; // ok indicates whether heartbeat processing was accepted.
  int64 server_unix = 2; // server_unix is control-plane unix time when heartbeat was handled.
  string message = 3; // message provides optional diagnostics for operators.
}
